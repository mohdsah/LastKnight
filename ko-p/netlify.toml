# Pahlawan Terakhir v5.4 — Netlify Config
[build]
  publish = "."

# Cache headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/js/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/js/engine/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/js/maps/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/js/systems/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/css/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/gm/*"
  [headers.values]
    Cache-Control = "no-cache"
    X-Robots-Tag = "noindex"

# Redirects
[[redirects]]
  from = "/gm"
  to   = "/gm/"
  status = 301

[[redirects]]
  from = "/admin"
  to   = "/gm/"
  status = 302
